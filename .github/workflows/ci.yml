name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  bridge:
    name: bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge/openrct2-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bridge/openrct2-plugin/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: build
        run: pnpm build

      - name: test
        run: pnpm test
