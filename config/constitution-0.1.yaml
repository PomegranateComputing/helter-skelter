# Governor policy for milestone 0.1. Read by core/governor at orchestrator
# startup. Every field here is a hard constraint the governor checks in
# core/governor/src/lib.rs's authorize() -- see docs/DECISIONS.md ADR-0004
# and docs/VISION.md's constitutional priorities.
policy_version: "0.1.0"

# Max number of authorized actions per rolling 24h window, across all
# rides/action types.
daily_action_budget: 20

# Max authorized actions per rolling 1h window (a tighter, faster-tripping
# limit than the daily budget).
max_actions_per_hour: 10

# A proposal's confidence must be >= this to even be considered.
min_confidence: 0.6

# set_ride_price is only ever authorized within this range (inclusive).
price_bounds:
  min: 0
  max: 20

# After a ride's price changes, no further price-change proposal for that
# same ride is authorized until this many ticks have passed.
per_ride_cooldown_ticks: 2000

# --- The Operator's rule thresholds (core/orchestrator's operator.rs) ---
# These aren't governor constraints -- they're when The Operator proposes
# something in the first place, before the governor ever sees it.

# Ride queue_length strictly above this, for `consecutive_snapshots_required`
# snapshots in a row, proposes a one-`price_step` price increase.
queue_length_high_threshold: 5

# Ride queue_length at or below this, for `consecutive_snapshots_required`
# snapshots in a row, proposes a one-`price_step` price decrease (floored
# at price_bounds.min).
queue_length_low_threshold: 0

consecutive_snapshots_required: 2

price_step: 1

# --- Phase 7: park snapshots and rollback ---

# Before authorizing any action, the orchestrator ensures a snapshot no
# older than this many ticks exists for the simulation (see
# core/orchestrator/src/snapshot.rs); otherwise it takes one first. See
# docs/DECISIONS.md ADR-0005 for why this is an autosave copy, not an
# on-demand save.
snapshot_max_age_ticks: 2000

# If cash drops by more than this many currency units between an
# authorized action's snapshot and the next observation.snapshot, the
# outcome is "wildly off prediction" and triggers an automatic rollback
# event + conservation state (core/governor's SafetyState).
max_unexpected_cash_drop: 1000

# After an automatic rollback, no proposal is authorized for this many
# ticks (SafetyState::Conservation) -- a cooling-off period, not a full
# stop.
conservation_ticks: 4000

# --- Phase 8: AFK safety net (core/governor::SafetyState, the watchdog) ---

# On orchestrator startup (or reconnect after a crash), the system enters
# SafetyState::Cautious and needs this many consecutive clean (non-
# degraded) heartbeats before it self-clears back to Normal.
cautious_recovery_heartbeats: 2

# The watchdog looks at every set_ride_price action for a ride within
# this many ticks; if its price direction reverses more than
# oscillation_max_reversals times in that window, the ride's policy is
# treated as unstable and the watchdog enters SafetyState::Quarantine
# (manual `orchestrator resolve` required).
oscillation_window_ticks: 5000
oscillation_max_reversals: 3

# If the watchdog finds the database unreachable for longer than this,
# it enters SafetyState::Stopped (manual `orchestrator resolve` required)
# -- a longer, harder-line threshold than core/orchestrator/src/db.rs's
# own DbState::Cautious degradation, which tolerates transient outages
# indefinitely by design (see ADR-0003).
db_unreachable_stopped_after_secs: 60

# How often the watchdog polls the orchestrator's /health endpoint and
# the database.
watchdog_poll_interval_secs: 5

# If more than this many actions are authorized in a rolling 1-minute
# window, the watchdog treats it as runaway behavior and enters
# SafetyState::Stopped -- deliberately far above max_actions_per_hour's
# per-hour pace, since this is a last-resort circuit breaker, not the
# governor's own rate limit.
action_rate_stopped_threshold_per_minute: 20
